<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>宠物之家</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #f5f0eb; }
        h1 { color: #d48c6b; font-size: 48px; }
        .pet { display: inline-block; margin: 20px; padding: 20px; background: white; border-radius: 20px; }
        img { width: 200px; height: 200px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>🐾 欢迎来到宠物之家</h1>
    <p>这里展示可爱的宠物们</p>
    <div class="pet">
        <img src="https://picsum.photos/200/200?random=1" alt="宠物1">
        <h3>小猫咪</h3>
    </div>
    <div class="pet">
        <img src="https://picsum.photos/200/200?random=2" alt="宠物2">
        <h3>小狗狗</h3>
    </div>
    <div class="pet">
        <img src="https://picsum.photos/200/200?random=3" alt="宠物3">
        <h3>小兔子</h3>
    </div>
    <p style="margin-top: 40px; color: #999;">✨ 欢迎常来看看</p>
</body>
</html>
